<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inR Remapper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1e1e1e;
            color: #ccc;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            margin: -20px -20px 20px -20px;
        }
        
        .header h1 {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-btn {
            padding: 4px 12px;
            background: #4ec9b0;
            border: none;
            border-radius: 3px;
            color: #1e1e1e;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .toggle-btn.paused {
            background: #f14c4c;
            color: #fff;
        }
        
        .toggle-btn:hover {
            opacity: 0.9;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ec9b0;
        }
        
        .status-text {
            font-size: 12px;
            color: #858585;
        }
        
        .config-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: #252526;
            border-radius: 4px;
        }
        
        .config-row label {
            color: #9cdcfe;
            font-size: 12px;
            min-width: 50px;
        }
        
        .config-row select {
            flex: 1;
            padding: 6px 10px;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            border-radius: 3px;
            color: #fff;
            font-size: 12px;
        }
        
        .config-row button {
            padding: 6px 14px;
            background: #0e639c;
            border: none;
            border-radius: 3px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        
        .config-row button:hover {
            background: #1177bb;
        }
        
        .config-row button.danger {
            background: #4d4d4d;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .panel {
            background: #252526;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #2d2d2d;
            border-bottom: 1px solid #3e3e42;
        }
        
        .panel-title {
            font-size: 12px;
            font-weight: 500;
            color: #fff;
        }
        
        .panel-body {
            padding: 14px;
        }
        
        .mapping-list {
            max-height: 350px;
            overflow-y: auto;
        }
        
        .mapping-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            background: #2d2d2d;
            border-radius: 3px;
            margin-bottom: 6px;
        }
        
        .mapping-item:hover {
            background: #3c3c3c;
        }
        
        .mapping-keys {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .key {
            padding: 4px 10px;
            background: #3e3e42;
            border-radius: 3px;
            font-family: Consolas, monospace;
            font-size: 12px;
            color: #ce9178;
            min-width: 40px;
            text-align: center;
        }
        
        .arrow {
            color: #6a6a6a;
        }
        
        .delete-btn {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid #4d4d4d;
            border-radius: 3px;
            color: #858585;
            font-size: 11px;
            cursor: pointer;
        }
        
        .delete-btn:hover {
            background: #f14c4c;
            border-color: #f14c4c;
            color: #fff;
        }
        
        .empty {
            text-align: center;
            color: #5a5a5a;
            padding: 30px;
            font-size: 12px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group label {
            font-size: 11px;
            color: #858585;
        }
        
        .form-group select {
            padding: 8px 10px;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            border-radius: 3px;
            color: #fff;
            font-size: 12px;
        }
        
        .form-group select:focus {
            outline: none;
            border-color: #0e639c;
        }
        
        .form-group select option {
            background: #2d2d2d;
        }
        
        .add-btn {
            padding: 8px 20px;
            background: #0e639c;
            border: none;
            border-radius: 3px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .add-btn:hover {
            background: #1177bb;
        }
        
        .hint {
            margin-top: 12px;
            padding: 8px;
            background: #2d2d2d;
            border-radius: 3px;
            font-size: 11px;
            color: #6a6a6a;
        }
        
        .error {
            margin-top: 12px;
            padding: 8px 12px;
            background: rgba(241, 76, 76, 0.2);
            border: 1px solid #f14c4c;
            border-radius: 3px;
            color: #f14c4c;
            font-size: 12px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #252526;
            padding: 20px;
            border-radius: 4px;
            min-width: 300px;
        }
        
        .modal-content h3 {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 8px 10px;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            border-radius: 3px;
            color: #fff;
            font-size: 12px;
            margin-bottom: 16px;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        .modal-buttons button {
            padding: 6px 16px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .modal-buttons .cancel {
            background: #3c3c3c;
            color: #ccc;
        }
        
        .modal-buttons .confirm {
            background: #0e639c;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>inR Remapper</h1>
            <div class="status">
                <button class="toggle-btn" id="toggleBtn" onclick="toggleEnabled()">暂停</button>
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">运行中</span>
            </div>
        </div>
        
        <div class="config-row">
            <label>配置</label>
            <select id="profileSelect"></select>
            <button onclick="showAddProfileModal()">新建</button>
            <button class="danger" onclick="deleteProfile()">删除</button>
        </div>
        
        <div class="main">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">映射列表</span>
                    <span id="mappingCount" style="color: #6a6a6a; font-size: 11px;">0 条</span>
                </div>
                <div class="panel-body">
                    <div class="mapping-list" id="mappingList">
                        <div class="empty">暂无映射配置</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">添加映射</span>
                </div>
                <div class="panel-body">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>原按键</label>
                            <select id="fromSelect">
                                <option value="">选择</option>
                                <optgroup label="字母">
                                    <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                                    <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                                    <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                                    <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                                    <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                                    <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                                    <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                                    <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                                    <option value="Y">Y</option><option value="Z">Z</option>
                                </optgroup>
                                <optgroup label="数字">
                                    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                                    <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                                    <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                                    <option value="9">9</option>
                                </optgroup>
                                <optgroup label="功能键">
                                    <option value="F1">F1</option><option value="F2">F2</option><option value="F3">F3</option>
                                    <option value="F4">F4</option><option value="F5">F5</option><option value="F6">F6</option>
                                    <option value="F7">F7</option><option value="F8">F8</option><option value="F9">F9</option>
                                    <option value="F10">F10</option><option value="F11">F11</option><option value="F12">F12</option>
                                </optgroup>
                                <optgroup label="控制键">
                                    <option value="Space">空格</option>
                                    <option value="Enter">回车</option>
                                    <option value="Tab">Tab</option>
                                    <option value="Escape">Esc</option>
                                </optgroup>
                                <optgroup label="方向键">
                                    <option value="Left">←</option>
                                    <option value="Up">↑</option>
                                    <option value="Right">→</option>
                                    <option value="Down">↓</option>
                                </optgroup>
                            </select>
                        </div>
                        
                        <span style="line-height: 32px; color: #6a6a6a;">→</span>
                        
                        <div class="form-group">
                            <label>目标按键</label>
                            <select id="toSelect">
                                <option value="">选择</option>
                                <optgroup label="字母">
                                    <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                                    <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                                    <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                                    <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                                    <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                                    <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                                    <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                                    <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                                    <option value="Y">Y</option><option value="Z">Z</option>
                                </optgroup>
                                <optgroup label="数字">
                                    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                                    <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                                    <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                                    <option value="9">9</option>
                                </optgroup>
                                <optgroup label="功能键">
                                    <option value="F1">F1</option><option value="F2">F2</option><option value="F3">F3</option>
                                    <option value="F4">F4</option><option value="F5">F5</option><option value="F6">F6</option>
                                    <option value="F7">F7</option><option value="F8">F8</option><option value="F9">F9</option>
                                    <option value="F10">F10</option><option value="F11">F11</option><option value="F12">F12</option>
                                </optgroup>
                                <optgroup label="控制键">
                                    <option value="Space">空格</option>
                                    <option value="Enter">回车</option>
                                    <option value="Tab">Tab</option>
                                    <option value="Escape">Esc</option>
                                </optgroup>
                                <optgroup label="方向键">
                                    <option value="Left">←</option>
                                    <option value="Up">↑</option>
                                    <option value="Right">→</option>
                                    <option value="Down">↓</option>
                                </optgroup>
                                <optgroup label="特殊">
                                    <option value="无">禁用</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                    
                    <button class="add-btn" style="width: 100%; margin-top: 14px;" onclick="addMapping()">添加映射</button>
                    
                    <div class="hint">
                        提示：输入 <code>W</code> → <code>Space</code> 可以把 W 键映射为空格键
                    </div>
                    
                    <div id="errorMsg"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="addProfileModal">
        <div class="modal-content">
            <h3>新建配置</h3>
            <input type="text" id="newProfileName" placeholder="配置名称">
            <div class="modal-buttons">
                <button class="cancel" onclick="hideAddProfileModal()">取消</button>
                <button class="confirm" onclick="addProfile()">确定</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { invoke } from '@tauri-apps/api/core';
        
        async function loadProfiles() {
            try {
                const profiles = await invoke('get_profiles');
                const select = document.getElementById('profileSelect');
                const currentId = await invoke('get_current_profile');
                
                select.innerHTML = profiles.map(p => 
                    `<option value="${p.id}">${p.name}</option>`
                ).join('');
                
                select.value = currentId;
            } catch (e) {
                showError('加载配置失败: ' + e);
            }
        }
        
        document.getElementById('profileSelect').addEventListener('change', async function() {
            try {
                await invoke('switch_profile', { id: parseInt(this.value) });
                await loadMappings();
            } catch (e) {
                showError('切换配置失败: ' + e);
            }
        });
        
        window.showAddProfileModal = function() {
            document.getElementById('addProfileModal').classList.add('show');
            document.getElementById('newProfileName').value = '';
            document.getElementById('newProfileName').focus();
        }
        
        window.hideAddProfileModal = function() {
            document.getElementById('addProfileModal').classList.remove('show');
        }
        
        window.addProfile = async function() {
            const name = document.getElementById('newProfileName').value.trim();
            if (!name) return;
            
            try {
                const id = await invoke('create_profile', { name });
                await loadProfiles();
                document.getElementById('profileSelect').value = id;
                await invoke('switch_profile', { id });
                await loadMappings();
                hideAddProfileModal();
            } catch (e) {
                showError('创建配置失败: ' + e);
            }
        }
        
        window.deleteProfile = async function() {
            const select = document.getElementById('profileSelect');
            if (select.options.length <= 1) {
                showError('至少需要保留一个配置');
                return;
            }
            
            if (!confirm('确定要删除该配置吗？')) return;
            
            try {
                const id = parseInt(select.value);
                await invoke('delete_profile', { id });
                await loadProfiles();
                await loadMappings();
            } catch (e) {
                showError('删除配置失败: ' + e);
            }
        }
        
        window.addMapping = async function() {
            const from = document.getElementById('fromSelect').value;
            const to = document.getElementById('toSelect').value;
            
            if (!from || !to) {
                showError('请选择原按键和目标按键');
                return;
            }
            
            try {
                await invoke('add_mapping', { from, to });
                document.getElementById('fromSelect').value = '';
                document.getElementById('toSelect').value = '';
                await loadMappings();
            } catch (e) {
                showError('添加失败: ' + e);
            }
        };
        
        async function loadMappings() {
            try {
                const mappings = await invoke('get_mappings');
                const list = document.getElementById('mappingList');
                document.getElementById('mappingCount').textContent = mappings.length + ' 条';
                
                if (mappings.length === 0) {
                    list.innerHTML = '<div class="empty">暂无映射配置</div>';
                    return;
                }
                
                list.innerHTML = mappings.map(m => `
                    <div class="mapping-item">
                        <div class="mapping-keys">
                            <span class="key">${m.from}</span>
                            <span class="arrow">→</span>
                            <span class="key">${m.to}</span>
                        </div>
                        <button class="delete-btn" onclick="removeMapping('${m.from}')">删除</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载映射失败:', e);
            }
        }
        
        window.removeMapping = async function(from) {
            try {
                await invoke('remove_mapping', { from });
                await loadMappings();
            } catch (e) {
                showError('删除失败: ' + e);
            }
        };
        
        window.toggleEnabled = async function() {
            try {
                const enabled = await invoke('is_enabled');
                await invoke('set_enabled', { enabled: !enabled });
                updateEnabledState(!enabled);
            } catch (e) {
                showError('切换状态失败: ' + e);
            }
        }
        
        async function updateEnabledState(enabled) {
            const btn = document.getElementById('toggleBtn');
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (enabled) {
                btn.textContent = '暂停';
                btn.classList.remove('paused');
                dot.style.background = '#4ec9b0';
                text.textContent = '运行中';
            } else {
                btn.textContent = '启动';
                btn.classList.add('paused');
                dot.style.background = '#f14c4c';
                text.textContent = '已暂停';
            }
        }
        
        async function loadEnabledState() {
            try {
                const enabled = await invoke('is_enabled');
                updateEnabledState(enabled);
            } catch (e) {
                console.error('加载状态失败:', e);
            }
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.className = 'error';
            el.textContent = msg;
        }
        
        loadProfiles();
        loadMappings();
        loadEnabledState();
    </script>
</body>
</html>
