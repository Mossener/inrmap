<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        
        .profile-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
        }
        
        .profile-bar label {
            color: #00d9ff;
            white-space: nowrap;
        }
        
        .profile-bar select {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 14px;
        }
        
        .profile-bar select option {
            background: #1a1a2e;
        }
        
        .profile-bar button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-add-profile {
            background: #00d9ff;
            color: #1a1a2e;
        }
        
        .btn-delete-profile {
            background: #ff4757;
            color: white;
        }
        
        .btn-delete-profile:hover {
            background: #ff6b7a;
        }
        
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .toggle-label {
            font-size: 18px;
            margin-right: 15px;
        }
        
        .toggle {
            position: relative;
            width: 60px;
            height: 30px;
        }
        
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            border-radius: 30px;
            transition: 0.3s;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        input:checked + .slider {
            background-color: #00d9ff;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        .mapping-list {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .mapping-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        
        .mapping-arrow {
            color: #00d9ff;
            margin: 0 10px;
        }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .delete-btn:hover {
            background: #ff6b7a;
        }
        
        .add-form {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        
        .form-label {
            width: 80px;
            color: #00d9ff;
        }
        
        .key-input-group {
            flex: 1;
            display: flex;
            gap: 5px;
        }
        
        .key-input-group select,
        .key-input-group input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 14px;
        }
        
        .key-input-group select {
            width: 140px;
        }
        
        .key-input-group input {
            flex: 1;
        }
        
        .key-input-group select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        
        .submit-btn:hover {
            background: #00f5ff;
        }
        
        .empty-msg {
            text-align: center;
            color: #888;
            padding: 30px;
        }
        
        .error-msg {
            color: #ff4757;
            text-align: center;
            margin-top: 10px;
        }
        
        .key-hint {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #00d9ff;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-cancel {
            background: #555;
            color: #fff;
        }
        
        .btn-confirm {
            background: #00d9ff;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>inR Remapper</h1>
        
        <div class="profile-bar">
            <label>配置:</label>
            <select id="profileSelect"></select>
            <button class="btn-add-profile" onclick="showAddProfileModal()">+ 新建</button>
            <button class="btn-delete-profile" onclick="deleteProfile()">删除</button>
        </div>
        
        <div class="toggle-container">
            <span class="toggle-label">启用</span>
            <label class="toggle">
                <input type="checkbox" id="enableToggle">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="mapping-list" id="mappingList">
            <div class="empty-msg">暂无映射</div>
        </div>
        
        <div class="add-form">
            <div class="form-row">
                <span class="form-label">原按键:</span>
                <div class="key-input-group">
                    <select id="fromSelect">
                        <option value="">-- 选择 --</option>
                        <optgroup label="字母">
                            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                            <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                            <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                            <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                            <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                            <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                            <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                            <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                            <option value="Y">Y</option><option value="Z">Z</option>
                        </optgroup>
                        <optgroup label="数字">
                            <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                            <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                            <option value="9">9</option>
                        </optgroup>
                        <optgroup label="功能键">
                            <option value="F1">F1</option><option value="F2">F2</option><option value="F3">F3</option>
                            <option value="F4">F4</option><option value="F5">F5</option><option value="F6">F6</option>
                            <option value="F7">F7</option><option value="F8">F8</option><option value="F9">F9</option>
                            <option value="F10">F10</option><option value="F11">F11</option><option value="F12">F12</option>
                        </optgroup>
                        <optgroup label="控制键">
                            <option value="Space">空格</option>
                            <option value="Enter">回车</option>
                            <option value="Tab">Tab</option>
                            <option value="Escape">Esc</option>
                            <option value="Shift">Shift</option>
                            <option value="Ctrl">Ctrl</option>
                            <option value="Alt">Alt</option>
                        </optgroup>
                        <optgroup label="方向键">
                            <option value="Left">←</option>
                            <option value="Up">↑</option>
                            <option value="Right">→</option>
                            <option value="Down">↓</option>
                        </optgroup>
                    </select>
                    <input type="text" id="fromKey" placeholder="或直接输入">
                </div>
            </div>
            
            <div class="form-row">
                <span class="form-label">目标按键:</span>
                <div class="key-input-group">
                    <select id="toSelect">
                        <option value="">-- 选择 --</option>
                        <optgroup label="字母">
                            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                            <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                            <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                            <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                            <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                            <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                            <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                            <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                            <option value="Y">Y</option><option value="Z">Z</option>
                        </optgroup>
                        <optgroup label="数字">
                            <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                            <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                            <option value="9">9</option>
                        </optgroup>
                        <optgroup label="功能键">
                            <option value="F1">F1</option><option value="F2">F2</option><option value="F3">F3</option>
                            <option value="F4">F4</option><option value="F5">F5</option><option value="F6">F6</option>
                            <option value="F7">F7</option><option value="F8">F8</option><option value="F9">F9</option>
                            <option value="F10">F10</option><option value="F11">F11</option><option value="F12">F12</option>
                        </optgroup>
                        <optgroup label="控制键">
                            <option value="Space">空格</option>
                            <option value="Enter">回车</option>
                            <option value="Tab">Tab</option>
                            <option value="Escape">Esc</option>
                            <option value="Shift">Shift</option>
                            <option value="Ctrl">Ctrl</option>
                            <option value="Alt">Alt</option>
                        </optgroup>
                        <optgroup label="方向键">
                            <option value="Left">←</option>
                            <option value="Up">↑</option>
                            <option value="Right">→</option>
                            <option value="Down">↓</option>
                        </optgroup>
                    </select>
                    <input type="text" id="toKey" placeholder="或直接输入">
                </div>
            </div>
            
            <button class="submit-btn" onclick="addMapping()">添加映射</button>
            <div class="key-hint">提示：可从下拉菜单选择，也可直接输入按键名称</div>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
    </div>
    
    <!-- 新建配置弹窗 -->
    <div class="modal" id="addProfileModal">
        <div class="modal-content">
            <h3>新建配置</h3>
            <input type="text" id="newProfileName" placeholder="输入配置名称">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideAddProfileModal()">取消</button>
                <button class="btn-confirm" onclick="addProfile()">确定</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { invoke } from '@tauri-apps/api/core';
        
        // 同步下拉菜单和输入框
        ['from', 'to'].forEach(type => {
            const select = document.getElementById(type + 'Select');
            const input = document.getElementById(type + 'Key');
            
            select.addEventListener('change', () => { input.value = ''; });
            input.addEventListener('input', () => { if (input.value) select.value = ''; });
        });
        
        // 加载配置列表
        async function loadProfiles() {
            try {
                const profiles = await invoke('get_profiles');
                const select = document.getElementById('profileSelect');
                const currentId = await invoke('get_current_profile');
                
                select.innerHTML = profiles.map(p => 
                    `<option value="${p.id}">${p.name}</option>`
                ).join('');
                
                select.value = currentId;
            } catch (e) {
                showError('加载配置失败: ' + e);
            }
        }
        
        // 切换配置
        document.getElementById('profileSelect').addEventListener('change', async function() {
            try {
                await invoke('switch_profile', { id: parseInt(this.value) });
                await loadMappings();
            } catch (e) {
                showError('切换配置失败: ' + e);
            }
        });
        
        // 显示新建配置弹窗
        window.showAddProfileModal = function() {
            document.getElementById('addProfileModal').classList.add('show');
            document.getElementById('newProfileName').value = '';
            document.getElementById('newProfileName').focus();
        }
        
        // 隐藏新建配置弹窗
        window.hideAddProfileModal = function() {
            document.getElementById('addProfileModal').classList.remove('show');
        }
        
        // 新建配置
        window.addProfile = async function() {
            const name = document.getElementById('newProfileName').value.trim();
            if (!name) {
                showError('请输入配置名称');
                return;
            }
            
            try {
                const id = await invoke('create_profile', { name });
                await loadProfiles();
                document.getElementById('profileSelect').value = id;
                await invoke('switch_profile', { id });
                await loadMappings();
                hideAddProfileModal();
            } catch (e) {
                showError('创建配置失败: ' + e);
            }
        }
        
        // 删除配置
        window.deleteProfile = async function() {
            const select = document.getElementById('profileSelect');
            if (select.options.length <= 1) {
                showError('至少需要保留一个配置');
                return;
            }
            
            if (!confirm('确定要删除该配置吗？')) return;
            
            try {
                const id = parseInt(select.value);
                await invoke('delete_profile', { id });
                await loadProfiles();
                await loadMappings();
            } catch (e) {
                showError('删除配置失败: ' + e);
            }
        }
        
        // 添加映射
        window.addMapping = async function() {
            const fromSelect = document.getElementById('fromSelect').value;
            const fromInput = document.getElementById('fromKey').value.trim();
            const toSelect = document.getElementById('toSelect').value;
            const toInput = document.getElementById('toKey').value.trim();
            
            const from = fromSelect || fromInput;
            const to = toSelect || toInput;
            
            if (!from || !to) {
                showError('请选择或输入原按键和目标按键');
                return;
            }
            
            try {
                await invoke('add_mapping', { from, to });
                document.getElementById('fromSelect').value = '';
                document.getElementById('fromKey').value = '';
                document.getElementById('toSelect').value = '';
                document.getElementById('toKey').value = '';
                await loadMappings();
            } catch (e) {
                showError('添加失败: ' + e);
            }
        };
        
        // 加载映射列表
        async function loadMappings() {
            try {
                const mappings = await invoke('get_mappings');
                const list = document.getElementById('mappingList');
                
                if (mappings.length === 0) {
                    list.innerHTML = '<div class="empty-msg">暂无映射</div>';
                    return;
                }
                
                list.innerHTML = mappings.map(m => `
                    <div class="mapping-item">
                        <span>${m.from}</span>
                        <span class="mapping-arrow">→</span>
                        <span>${m.to}</span>
                        <button class="delete-btn" onclick="removeMapping('${m.from}')">删除</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载映射失败:', e);
            }
        }
        
        // 删除映射
        window.removeMapping = async function(from) {
            try {
                await invoke('remove_mapping', { from });
                await loadMappings();
            } catch (e) {
                showError('删除失败: ' + e);
            }
        };
        
        // 启用/禁用开关
        document.getElementById('enableToggle').addEventListener('change', async function(e) {
            try {
                await invoke('set_enabled', { enabled: e.target.checked });
            } catch (e) {
                showError('设置失败: ' + e);
            }
        });
        
        // 显示错误
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            setTimeout(() => { el.textContent = ''; }, 3000);
        }
        
        // 初始化
        loadProfiles();
        loadMappings();
    </script>
</body>
</html>
