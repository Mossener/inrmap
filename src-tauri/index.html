<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inR Remapper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .toggle-label {
            font-size: 18px;
            margin-right: 15px;
        }
        
        .toggle {
            position: relative;
            width: 60px;
            height: 30px;
        }
        
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            border-radius: 30px;
            transition: 0.3s;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        input:checked + .slider {
            background-color: #00d9ff;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        .mapping-list {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 150px;
        }
        
        .mapping-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            margin-bottom: 8px;
        }
        
        .mapping-item span {
            font-size: 16px;
        }
        
        .arrow {
            color: #00d9ff;
            margin: 0 10px;
        }
        
        .delete-btn {
            background: #ff4757;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .delete-btn:hover {
            background: #ff6b81;
        }
        
        .add-mapping {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .add-mapping input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        
        .add-mapping input::placeholder {
            color: #888;
        }
        
        .add-btn {
            background: #00d9ff;
            border: none;
            color: #1a1a2e;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .add-btn:hover {
            background: #00b8d9;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>inR Remapper</h1>
        
        <div class="toggle-container">
            <span class="toggle-label">启用重映射</span>
            <label class="toggle">
                <input type="checkbox" id="enabled" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="mapping-list" id="mappingList">
            <!-- 映射列表 -->
        </div>
        
        <div class="add-mapping">
            <input type="text" id="fromKey" placeholder="原始按键 (如 A)">
            <input type="text" id="toKey" placeholder="目标按键 (如 B)">
            <button class="add-btn" onclick="addMapping()">添加</button>
        </div>
        
        <div class="status" id="status">
            键盘重映射服务运行中
        </div>
    </div>
    
    <script type="module">
        const { invoke } = window.__TAURI__.core;
        
        async function loadMappings() {
            try {
                const mappings = await invoke('get_mappings');
                const list = document.getElementById('mappingList');
                
                if (mappings.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #888;">暂无映射，点击下方添加</p>';
                    return;
                }
                
                list.innerHTML = mappings.map(m => `
                    <div class="mapping-item">
                        <span>${m.from}</span>
                        <span class="arrow">→</span>
                        <span>${m.to}</span>
                        <button class="delete-btn" onclick="deleteMapping('${m.from}')">删除</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载映射失败:', e);
            }
        }
        
        async function addMapping() {
            const from = document.getElementById('fromKey').value.trim();
            const to = document.getElementById('toKey').value.trim();
            
            if (!from || !to) {
                alert('请填写完整');
                return;
            }
            
            try {
                await invoke('add_mapping', { from, to });
                document.getElementById('fromKey').value = '';
                document.getElementById('toKey').value = '';
                loadMappings();
            } catch (e) {
                console.error('添加失败:', e);
                alert('添加失败: ' + e);
            }
        }
        
        async function deleteMapping(from) {
            try {
                await invoke('remove_mapping', { from });
                loadMappings();
            } catch (e) {
                console.error('删除失败:', e);
            }
        }
        
        window.addMapping = addMapping;
        window.deleteMapping = deleteMapping;
        
        document.getElementById('enabled').addEventListener('change', async (e) => {
            try {
                await invoke('set_enabled', { enabled: e.target.checked });
                document.getElementById('status').textContent = 
                    e.target.checked ? '键盘重映射服务运行中' : '键盘重映射已暂停';
            } catch (e) {
                console.error('设置失败:', e);
            }
        });
        
        loadMappings();
    </script>
</body>
</html>
